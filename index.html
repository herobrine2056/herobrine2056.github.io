<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>TEST - Platformer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <div class="container">
    <div class="titleWrap" id="titleWrap">
      <div class="title" id="titleContainer" aria-hidden="false"></div>
      <div class="controls">
        <button id="playBtn" aria-label="Jouer">Jouer</button>
      </div>
    </div>

    <div id="gameWrap" role="application" aria-label="Jeu platformer">
      <canvas id="gameCanvas" width="1000" height="560"></canvas>
      <div class="hud" id="hud">Progression: 0%</div>
      <div class="hud coins" id="coinHud" aria-live="polite">Pièces: 0 / 0</div>
    </div>
  </div>
</div>

<!-- Touch controls -->
<div id="touchControls" aria-hidden="true">
  <div class="joystickArea" id="joystickArea">
    <div class="joystickBase" id="joystickBase">
      <div class="joystickKnob" id="joystickKnob"></div>
    </div>
  </div>
  <div class="jumpButton" id="jumpButton" aria-label="Saut">SAUT</div>
</div>

<div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal" role="document">
    <div class="closeX" id="closeModal" title="Fermer"></div>
    <h2 id="modalTitle">Bravo !</h2>
    <p id="modalText">Tu as terminé le parcours. Félicitations.</p>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
